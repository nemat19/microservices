#spring.application.name=accounts
#spring.devtools.restart.enabled=true
server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:mem:test:db
    username: sa
    password: ''
  h2:
    console:
      enable: true
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
    format-sql: true
  application:
    name: accounts
  devtools:
    restart:
      enable: true






